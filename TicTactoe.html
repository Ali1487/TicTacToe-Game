<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#fff;
    margin:0;
    padding:20px;
}

h1{
    color:#222;
}

.container{
    max-width:500px;
    margin:auto;
}

.players{
    margin-bottom:15px;
}

input{
    padding:8px;
    margin:5px;
    width:140px;
}

.scoreboard{
    display:flex;
    justify-content:space-around;
    margin:20px 0;
    font-weight:bold;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:5px;
    justify-content:center;
}

.cell{
    width:100px;
    height:100px;
    border:2px solid #333;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    cursor:pointer;
}

.cell:hover{
    background:#f3f3f3;
}

.win{
    background:#d4edda;
}

#status{
    margin:15px;
    font-size:20px;
    font-weight:bold;
}

button{
    padding:10px 15px;
    margin:10px 5px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<div class="players">
    <input type="text" id="playerX" placeholder="Player X Name">
    <input type="text" id="playerO" placeholder="Player O Name">
</div>

<div class="scoreboard">
    <div>X Wins: <span id="xScore">0</span></div>
    <div>Draws: <span id="drawScore">0</span></div>
    <div>O Wins: <span id="oScore">0</span></div>
</div>

<div id="status">Player X Turn</div>

<div class="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
</div>

<button onclick="restartGame()">New Round</button>
<button onclick="resetScores()">Reset Scores</button>

</div>

<script>

const cells = document.querySelectorAll(".cell");
const statusText = document.getElementById("status");

let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameActive = true;

let xScore = 0;
let oScore = 0;
let drawScore = 0;

const winPatterns = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

cells.forEach(cell=>{
    cell.addEventListener("click", handleClick);
});

function getPlayerName(symbol){
    if(symbol==="X"){
        return document.getElementById("playerX").value || "Player X";
    }
    return document.getElementById("playerO").value || "Player O";
}

function handleClick(){

    const index=this.dataset.index;

    if(board[index]!=="" || !gameActive){
        return;
    }

    board[index]=currentPlayer;
    this.textContent=currentPlayer;

    checkWinner();
}

function checkWinner(){

    for(let pattern of winPatterns){

        const [a,b,c]=pattern;

        if(
            board[a] &&
            board[a]===board[b] &&
            board[a]===board[c]
        ){

            cells[a].classList.add("win");
            cells[b].classList.add("win");
            cells[c].classList.add("win");

            statusText.textContent =
            getPlayerName(currentPlayer) + " Wins";

            gameActive=false;

            if(currentPlayer==="X"){
                xScore++;
                document.getElementById("xScore").textContent=xScore;
            }else{
                oScore++;
                document.getElementById("oScore").textContent=oScore;
            }

            return;
        }
    }

    if(!board.includes("")){
        drawScore++;
        document.getElementById("drawScore").textContent=drawScore;
        statusText.textContent="Match Draw";
        gameActive=false;
        return;
    }

    currentPlayer=currentPlayer==="X"?"O":"X";

    statusText.textContent=
    getPlayerName(currentPlayer)+" Turn";
}

function restartGame(){

    board=["","","","","","","","",""];
    gameActive=true;
    currentPlayer="X";

    cells.forEach(cell=>{
        cell.textContent="";
        cell.classList.remove("win");
    });

    statusText.textContent=
    getPlayerName("X")+" Turn";
}

function resetScores(){

    xScore=0;
    oScore=0;
    drawScore=0;

    document.getElementById("xScore").textContent=0;
    document.getElementById("oScore").textContent=0;
    document.getElementById("drawScore").textContent=0;

    restartGame();
}

</script>

</body>
</html>
